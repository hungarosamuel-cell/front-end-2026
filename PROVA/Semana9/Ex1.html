<!DOCTYPE html>
<html>

<head>
    <title>Ex1</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .todo-app {
            text-align: center;
            max-width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #ccc;
        }

        li.completed {
            text-decoration: line-through;
        }

        button {
            margin-top: 10px;
        }
        .valido{
            color:green;
        }
        .invalido{
            color:red;
        }
    </style>

</head>

<body>
    <div class="todo-app">
        <h2>Testador de CPF</h2>
        <input type="text" id="CPF" placeholder="Insira o CPF">
        <button onclick="testCPF()">Validar</button>
        <h4 id="resultado"></h4>
    </div>

    <script>

        function testCPF() {
            let cpf = document.getElementById("CPF").value;
            cpf = cpf.replace(/\D/g, "");
            const resultado = document.getElementById("resultado");
            if (cpf.length !== 11) {
                resultado.textContent = "CPF Inválido!";
                resultado.className = "invalido";
                return;
            }
            if (/^(\d)\1+$/.test(cpf)) {
                resultado.textContent = "CPF Inválido!";
                resultado.className = "invalido";
                return;
            }
            let soma = 0;
            for (let i = 0; i < 9; i++) {
                soma += parseInt(cpf[i]) * (10 - i);
            }
            let primeiroDigito = (soma * 10) % 11;
            if (primeiroDigito === 10) {
                primeiroDigito = 0;
            }
            soma = 0;
            for (let i = 0; i < 10; i++) {
                soma += parseInt(cpf[i]) * (11 - i);
            }
            let segundoDigito = (soma * 10) % 11;
            if (segundoDigito === 10) {
                segundoDigito = 0;
            }
            if (
                primeiroDigito == cpf[9] &&
                segundoDigito == cpf[10]
            ) {
                resultado.textContent = "CPF Válido!";
                resultado.className = "valido";
            } else {
                resultado.textContent = "CPF Inválido!";
                resultado.className = "invalido";
            }

        }

    </script>
</body>

</html>
