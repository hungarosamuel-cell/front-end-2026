<!DOCTYPE html>
<html>

<head>
    <title>Ex4</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .todo-app {
            text-align: center;
            max-width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #ccc;
        }

        li.completed {
            text-decoration: line-through;
        }

        button {
            margin-top: 10px;
        }
    </style>

</head>

<body>
    <div class="todo-app">
         <h2>Infinity Bank</h2>
        <h3>Lista de Convidados VIP</h3>

        <input type="text" id="nomeConvidado" placeholder="Digite o nome">
        <button id="adicionar">Adicionar</button>

        <ul id="lista"></ul>
    </div>
    <script>
        const botao = document.getElementById("calcular");

        botao.addEventListener("click", function () {
            const bandeira = document.getElementById("bandeira").value;
            const valorVenda = Number(document.getElementById("valor").value);
            const parcelas = Number(document.getElementById("parcelas").value);
            const resultado = document.getElementById("resultado");

            let taxaBandeira = 0;

            switch (bandeira) {
                case "visa":
                    taxaBandeira = 0.02;
                    break;

                case "master":
                    taxaBandeira = 0.0185;
                    break;

                case "elo":
                    taxaBandeira = 0.03;
                    break;

                default:
                    taxaBandeira = 0;
            }

            if (valorVenda <= 0 || parcelas <= 0) {
                resultado.innerHTML = "<p style='color: red;'>Preencha os dados corretamente.</p>";
                return;
            }

            const valorTaxaBandeira = valorVenda * taxaBandeira;

            const juros = valorVenda * (0.0035 * parcelas);

            const taxaMensal = 12.50 * parcelas;

            const valorTotal = valorVenda + valorTaxaBandeira + juros + taxaMensal;

            const valorParcela = valorTotal / parcelas;

            resultado.innerHTML = `
                <h3>Resumo da Venda</h3>
                <p>Valor da Venda: R$ ${valorVenda.toFixed(2)}</p>
                <p>Valor da Taxa da Bandeira: R$ ${valorTaxaBandeira.toFixed(2)}</p>
                <p>Valor dos Juros: R$ ${juros.toFixed(2)}</p>
                <p>Taxa Mensal Total: R$ ${taxaMensal.toFixed(2)}</p>
                <p>Valor Total: R$ ${valorTotal.toFixed(2)}</p>
                <p><strong>Valor de cada Parcela: R$ ${valorParcela.toFixed(2)}</strong></p>
            `;
        });
    </script>
</body>

</html>
