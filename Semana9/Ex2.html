<!DOCTYPE html>
<html>

<head>
    <title>Ex2</title>
    <link rel="stylesheet" type="text/css" href="styles.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .todo-app {
            text-align: center;
            max-width: 400px;
            padding: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            background-color: #fff;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            display: flex;
            justify-content: space-between;
            padding: 8px;
            border-bottom: 1px solid #ccc;
        }

        li.completed {
            text-decoration: line-through;
        }

        button {
            margin-top: 10px;
        }
    </style>

</head>

<body>
    <div class="todo-app">
        <label>Celcius</label>
        <input type="number" id="celsius" placeholder="Digite em Celcius">
        
        <br>
        
        <label>Fahrenheit:</label>
        <input type="number" id="fahrenheit" placeholder="Digite em Fahrenheit">
    </div>
    <script>

        const celsius = document.getElementById("celsius");
        const fahrenheit = document.getElementById("fahrenheit");

        celsius.addEventListener("input", function () {
            if (celsius.value === "") {
                fahrenheit.value = "";
                return;
            }

            let c = Number(celsius.value);
            let f = (c * 9 / 5) + 32;

            fahrenheit.value = f.toFixed(2);
        });

        fahrenheit.addEventListener("input", function () {
            if (fahrenheit.value === "") {
                celsius.value = "";
                return;
            }

            let f = Number(fahrenheit.value);
            let c = (f - 32) * 5 / 9;

            celsius.value = c.toFixed(2);
        });
    </script>
</body>

</html>
